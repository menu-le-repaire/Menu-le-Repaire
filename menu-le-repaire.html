    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      background: #f0e8da !important;
      color: #1a1a1a !important;
    }

    body {
      background: #f0e8da !important;
      color: #1a1a1a !important;
      font-family: 'EB Garamond', serif;
      min-height: 100vh;
    }

    :root {
      --cream: #f0e8da;
      --red: #8b1a1a;
      --black: #1a1a1a;
      --grey: #555;
    }

    /* LANG SELECTOR */
    .lang-bar {
      background: #f0e8da !important;
      display: flex;
      justify-content: flex-end;
      padding: 8px 16px 0;
      gap: 6px;
    }
    .lang-bar button {
      background: none;
      border: 1px solid #ccc4b4;
      border-radius: 2px;
      font-family: 'EB Garamond', serif;
      font-size: 12px;
      letter-spacing: 0.08em;
      padding: 3px 9px;
      cursor: pointer;
      color: #888;
      transition: all 0.2s;
    }
    .lang-bar button.active, .lang-bar button:hover {
      background: #8b1a1a;
      border-color: #8b1a1a;
      color: white;
    }

    /* HEADER */
    header {
      text-align: center;
      padding: 28px 24px 20px;
      border-bottom: 2px solid #8b1a1a;
      background: #f0e8da !important;
    }
    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #8b1a1a;
      margin-bottom: 6px;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: clamp(44px, 11vw, 72px);
      font-weight: 900;
      line-height: 1;
      color: #1a1a1a !important;
      text-transform: uppercase;
    }
    .logo span { color: #8b1a1a; }
    .tagline {
      margin-top: 10px;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #1a1a1a !important;
    }
    .tagline span { color: #8b1a1a; margin: 0 8px; }

    /* NAV */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #1a1a1a !important;
      display: flex;
      justify-content: flex-start;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    nav::-webkit-scrollbar { display: none; }
    nav button {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #888;
      font-family: 'EB Garamond', serif;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 13px 16px;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.2s;
      flex-shrink: 0;
    }
    nav button:hover { color: #ccc; }
    nav button.active { color: #8b1a1a; border-bottom-color: #8b1a1a; }

    /* SECTIONS */
    .section {
      display: none;
      padding: 36px 20px 60px;
      max-width: 580px;
      margin: 0 auto;
      animation: fadeIn 0.25s ease;
      background: #f0e8da !important;
    }
    .section.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section-title {
      text-align: center;
      margin-bottom: 28px;
      position: relative;
    }
    .section-title::before,
    .section-title::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 18%;
      height: 1px;
      background: #8b1a1a;
      opacity: 0.5;
    }
    .section-title::before { left: 0; }
    .section-title::after { right: 0; }
    .section-title h2 {
      display: inline-block;
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      border: 1.5px solid #8b1a1a;
      padding: 7px 18px;
      color: #1a1a1a !important;
      background: #f0e8da !important;
    }

    .sub-title {
      text-align: center;
      margin: 30px 0 18px;
    }
    .sub-title h3 {
      display: inline-block;
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border: 1px solid #8b1a1a;
      padding: 5px 16px;
      color: #1a1a1a !important;
      background: #f0e8da !important;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #ddd5c4;
    }
    .item:last-child { border-bottom: none; }
    .item-left { flex: 1; }
    .item-name {
      font-size: 17px;
      font-weight: 600;
      color: #1a1a1a !important;
    }
    .item-desc {
      font-size: 13px;
      color: #555 !important;
      font-style: italic;
      margin-top: 2px;
      line-height: 1.4;
    }
    .item-price {
      font-size: 15px;
      font-weight: 600;
      color: #8b1a1a !important;
      white-space: nowrap;
    }

    .table-header {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1.5px solid #8b1a1a;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #555 !important;
      font-weight: 600;
    }
    .table-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      padding: 11px 0;
      border-bottom: 1px solid #ddd5c4;
      align-items: baseline;
    }
    .table-row:last-child { border-bottom: none; }
    .table-row .name { font-size: 16px; font-weight: 600; color: #1a1a1a !important; }
    .table-row .price { font-size: 14px; color: #8b1a1a !important; font-weight: 600; text-align: right; }
    .col-right { text-align: right; }

    .note {
      font-size: 13px;
      font-style: italic;
      color: #555 !important;
      text-align: center;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px dashed #ccc4b4;
    }

    .formule {
      background: white !important;
      border: 1.5px solid #8b1a1a;
      padding: 22px;
      margin-bottom: 18px;
    }
    .formule-name {
      font-family: 'Playfair Display', serif;
      font-size: 19px;
      font-weight: 700;
      color: #1a1a1a !important;
      margin-bottom: 8px;
    }
    .formule-desc {
      font-size: 15px;
      color: #555 !important;
      font-style: italic;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .formule-price {
      font-size: 22px;
      font-weight: 700;
      color: #8b1a1a !important;
    }

    .hh-card {
      background: #1a1a1a !important;
      color: white !important;
      padding: 22px;
      margin-bottom: 18px;
      text-align: center;
    }
    .hh-title { font-family: 'Playfair Display', serif; font-size: 22px; color: white !important; margin-bottom: 4px; }
    .hh-hours { font-size: 13px; letter-spacing: 0.15em; color: #aaa !important; margin-bottom: 16px; }
    .hh-items { display: flex; justify-content: center; gap: 32px; flex-wrap: wrap; }
    .hh-item { text-align: center; }
    .hh-item-name { font-size: 16px; font-weight: 600; color: white !important; }
    .hh-item-sub { font-size: 13px; color: #aaa !important; font-style: italic; }
    .hh-item-price {
      display: inline-block;
      background: #8b1a1a !important;
      color: white !important;
      font-size: 15px;
      font-weight: 700;
      padding: 3px 10px;
      margin-top: 6px;
    }

    /* HOME LIST */
    .home-list {
      max-width: 560px;
      margin: 0 auto;
      padding: 8px 20px 40px;
    }
    .home-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 4px;
      border-bottom: 1px solid #ddd5c4;
      cursor: pointer;
      background: none;
      border-left: none;
      border-right: none;
      border-top: none;
      width: 100%;
      text-align: left;
      font-family: 'EB Garamond', serif;
      transition: background 0.15s;
    }
    .home-item:first-child { border-top: 1px solid #ddd5c4; }
    .home-item:active { background: rgba(139,26,26,0.06); }
    .home-text { flex: 1; }
    .home-name {
      font-family: 'Playfair Display', serif;
      font-size: 19px;
      font-weight: 700;
      color: #1a1a1a !important;
      letter-spacing: 0.02em;
    }
    .home-chevron {
      color: #8b1a1a !important;
      font-size: 18px;
      flex-shrink: 0;
    }

    /* BACK BAR */
    .back-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #1a1a1a !important;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .back-btn {
      background: none;
      border: none;
      color: white !important;
      font-family: 'EB Garamond', serif;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
    }
    .back-current {
      color: #c98a8a !important;
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-left: auto;
    }

    footer {
      background: #1a1a1a !important;
      color: white !important;
      text-align: center;
      padding: 22px 16px;
      font-size: 13px;
      letter-spacing: 0.06em;
    }
    footer .sub { color: #888 !important; margin-top: 5px; font-size: 12px; }
  </style>
</head>

let currentLang = 'fr';
let currentView = 'home'; // 'home' or 'section'
let currentSection = 0;

function setLang(lang, btn) {
  currentLang = lang;
  document.querySelectorAll('.lang-bar button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function goHome() {
  currentView = 'home';
  render();
}

function showSection(i) {
  currentSection = i;
  currentView = 'section';
  render();
}

function renderTableRow(sub, row) {
  // Hide empty 2nd/3rd columns gracefully
  const cells = [];
  for (let i = 1; i < row.length; i++) {
    if (row[i] !== '') cells.push(`<span class="price">${row[i]}</span>`);
  }
  return `<div class="table-row" style="grid-template-columns: 1fr ${cells.map(()=>'auto').join(' ')};"><span class="name">${row[0]}</span>${cells.join('')}</div>`;
}

function render() {
  const t = translations[currentLang];
  const backContainer = document.getElementById('back-bar-container');
  const content = document.getElementById('content');

  if (currentView === 'home') {
    backContainer.innerHTML = '';
    let html = '<div class="home-list">';
    t.tabs.forEach((tab, i) => {
      html += `<button class="home-item" onclick="showSection(${i})">
        <span class="home-text"><span class="home-name">${tab}</span></span>
        <span class="home-chevron">›</span>
      </button>`;
    });
    html += '</div>';
    content.innerHTML = html;
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }

  // Section view
  backContainer.innerHTML = `<div class="back-bar">
    <button class="back-btn" onclick="goHome()">‹ Menu</button>
    <span class="back-current">${t.tabs[currentSection]}</span>
  </div>`;

  const s = t.sections[currentSection];
  let html = `<div class="section active" id="${s.id}">`;
  html += `<div class="section-title"><h2>${s.title}</h2></div>`;

  if (s.type === 'menus') {
    html += `<div class="hh-card">
      <div class="hh-title">${s.hh.title}</div>
      <div class="hh-hours">${s.hh.hours}</div>
      <div class="hh-items">
        ${s.hh.items.map(it => `<div class="hh-item">
          <div class="hh-item-name">${it.name}</div>
          ${it.sub ? `<div class="hh-item-sub">${it.sub}</div>` : ''}
          <div class="hh-item-price">${it.price}</div>
        </div>`).join('')}
      </div>
    </div>`;
    s.formules.forEach(f => {
      html += `<div class="formule">
        <div class="formule-name">${f.name}</div>
        <div class="formule-desc">${f.desc.replace(/\n/g,'<br>')}</div>
        <div class="formule-price">${f.price}</div>
      </div>`;
    });
  } else if (s.type === 'boissons') {
    s.subsections.forEach(sub => {
      html += `<div class="sub-title"><h3>${sub.title}</h3></div>`;
      if (sub.simple) {
        sub.simple.forEach(it => {
          html += `<div class="item"><div class="item-left"><div class="item-name">${it.name}</div></div><div class="item-price">${it.price}</div></div>`;
        });
      } else {
        const hasCol2 = sub.cols[1] !== '';
        const hasCol3 = sub.cols[2] !== '';
        html += `<div class="table-header"><span>${sub.cols[0]}</span>${hasCol2?`<span class="col-right">${sub.cols[1]}</span>`:''}${hasCol3?`<span class="col-right">${sub.cols[2]}</span>`:''}</div>`;
        sub.rows.forEach(row => {
          html += renderTableRow(sub, row);
        });
      }
    });
  } else {
    s.items.forEach(it => {
      html += `<div class="item">
        <div class="item-left">
          <div class="item-name">${it.name}</div>
          ${it.desc ? `<div class="item-desc">${it.desc}</div>` : ''}
        </div>
        <div class="item-price">${it.price}</div>
      </div>`;
    });
    if (s.note) html += `<p class="note">${s.note}</p>`;
  }

  html += '</div>';
  content.innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

render();
</script>
